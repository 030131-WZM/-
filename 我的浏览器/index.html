<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的浏览器 - 万能小虾米</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .search-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .search-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-input {
            flex: 1;
            min-width: 300px;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .search-btn {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .search-btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }
        
        .quick-search {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .quick-search-btn {
            padding: 10px 20px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .quick-search-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .destinations {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .destination-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .destination-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        
        .destination-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.4em;
        }
        
        .destination-card p {
            color: #666;
            line-height: 1.6;
        }
        
        .destination-card .icon {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .footer {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .footer p {
            color: #666;
            margin-bottom: 10px;
        }
        
        .footer .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .footer .links a {
            color: #667eea;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .footer .links a:hover {
            background: #667eea;
            color: white;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .search-container {
                flex-direction: column;
            }
            
            .search-input {
                min-width: 100%;
            }
            
            .destinations {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 我的浏览器</h1>
            <p>万能小虾米为您打造的专属浏览器 - 让上网更简单、更高效</p>
        </div>
        
        <div class="search-section">
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="输入您要搜索的内容...">
                <button class="search-btn" onclick="performSearch()">🔍 搜索</button>
            </div>
            
            <div class="quick-search">
                <button class="quick-search-btn" onclick="quickSearch('Google')">🔍 Google</button>
                <button class="quick-search-btn" onclick="quickSearch('百度')">🔍 百度</button>
                <button class="quick-search-btn" onclick="quickSearch('必应')">🔍 必应</button>
                <button class="quick-search-btn" onclick="quickSearch('知乎')">🔍 知乎</button>
                <button class="quick-search-btn" onclick="quickSearch('微博')">🔍 微博</button>
                <button class="quick-search-btn" onclick="quickSearch('淘宝')">🔍 淘宝</button>
            </div>
        </div>
        
        <div class="destinations">
            <div class="destination-card" onclick="searchDestination('旅游景点')">
                <div class="icon">🏞️</div>
                <h3>旅游景点</h3>
                <p>发现世界各地的美丽景点，规划您的完美旅程</p>
            </div>
            
            <div class="destination-card" onclick="searchDestination('美食推荐')">
                <div class="icon">🍜</div>
                <h3>美食推荐</h3>
                <p>探索各地特色美食，满足您的味蕾</p>
            </div>
            
            <div class="destination-card" onclick="searchDestination('酒店住宿')">
                <div class="icon">🏨</div>
                <h3>酒店住宿</h3>
                <p>找到最适合的住宿，享受舒适的旅行体验</p>
            </div>
            
            <div class="destination-card" onclick="searchDestination('交通出行')">
                <div class="icon">🚗</div>
                <h3>交通出行</h3>
                <p>了解各种交通方式，轻松规划行程</p>
            </div>
            
            <div class="destination-card" onclick="searchDestination('购物指南')">
                <div class="icon">🛍️</div>
                <h3>购物指南</h3>
                <p>发现优质商品，享受购物乐趣</p>
            </div>
            
            <div class="destination-card" onclick="searchDestination('娱乐活动')">
                <div class="icon">🎪</div>
                <h3>娱乐活动</h3>
                <p>丰富您的旅行生活，体验精彩活动</p>
            </div>
        </div>
        
        <div class="footer">
            <p>💡 小贴士：点击搜索结果直接在新页面打开，享受更好的浏览体验</p>
            <div class="links">
                <a href="#" onclick="showHelp()">使用帮助</a>
                <a href="#" onclick="showAbout()">关于我们</a>
                <a href="#" onclick="showContact()">联系我们</a>
            </div>
        </div>
    </div>
    
    <script>
        // 搜索功能
        function performSearch() {
            const searchInput = document.getElementById('searchInput');
            const query = searchInput.value.trim();
            
            if (query) {
                // 使用新的搜索功能，直接在新页面显示结果
                window.open(`search.html?q=${encodeURIComponent(query)}`, '_blank');
            } else {
                alert('请输入搜索内容');
            }
        }
        
        // 快速搜索
        function quickSearch(engine) {
            const searchInput = document.getElementById('searchInput');
            const query = searchInput.value.trim();
            
            if (query) {
                let searchUrl = '';
                
                switch(engine) {
                    case 'Google':
                        searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                        break;
                    case '百度':
                        searchUrl = `https://www.baidu.com/s?wd=${encodeURIComponent(query)}`;
                        break;
                    case '必应':
                        searchUrl = `https://www.bing.com/search?q=${encodeURIComponent(query)}`;
                        break;
                    case '知乎':
                        searchUrl = `https://www.zhihu.com/search?type=content&q=${encodeURIComponent(query)}`;
                        break;
                    case '微博':
                        searchUrl = `https://s.weibo.com/weibo?q=${encodeURIComponent(query)}`;
                        break;
                    case '淘宝':
                        searchUrl = `https://s.taobao.com/search?q=${encodeURIComponent(query)}`;
                        break;
                }
                
                window.open(searchUrl, '_blank');
            } else {
                alert('请输入搜索内容');
            }
        }
        
        // 目的地搜索
        function searchDestination(destination) {
            // 使用新的搜索功能，直接在新页面显示结果
            window.open(`search.html?q=${encodeURIComponent(destination)}`, '_blank');
        }
        
        // 回车键搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
        
        // 显示帮助
        function showHelp() {
            alert('使用帮助：\n\n1. 在搜索框中输入关键词\n2. 点击搜索按钮或按回车键\n3. 搜索结果将在新页面中显示\n4. 点击搜索结果直接打开网页\n\n享受便捷的浏览体验！');
        }
        
        // 显示关于
        function showAbout() {
            alert('关于我的浏览器：\n\n版本：1.0\n开发者：万能小虾米\n特色功能：\n- 智能搜索\n- 快速访问\n- 跨设备兼容\n- 美观界面\n\n感谢使用！');
        }
        
        // 显示联系
        function showContact() {
            alert('联系我们：\n\n开发者：万能小虾米\n邮箱：xiaoming@example.com\n\n如有问题或建议，欢迎联系我们！');
        }
    </script>
</body>
</html>
